name: locallend
description: "LocalLend — share and rent household appliances with neighbours."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # Maps & location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # Media
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Utilities
  intl: 0.20.2
  uuid: ^4.5.1
  flutter_dotenv: ^5.1.0
  http: ^1.2.2

  # Dev helper
  device_preview: ^1.3.1

  # Web interop
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
